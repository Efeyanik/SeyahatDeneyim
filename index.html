<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadece Login Ekranı</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        input { display: block; width: 100%; margin-bottom: 10px; padding: 8px; }
        button { padding: 10px; width: 100%; margin-bottom: 5px; cursor: pointer; }
        #message { margin-top: 15px; font-weight: bold; color: blue; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h2>Giriş Yap</h2>
    
    <input type="text" id="username" placeholder="Kullanıcı Adı" value="test">
    <input type="password" id="password" placeholder="Şifre" value="123456">
    
    <button onclick="login()">Giriş Yap</button>
    <button id="profileBtn" class="hidden" onclick="getProfile()">Sisteme Eriş (Token Testi)</button>
    <button id="logoutBtn" class="hidden" onclick="logout()">Çıkış Yap</button>

    <div id="message"></div>

    <script>
        const API_URL = 'http://localhost:3000';

        // --- GİRİŞ YAPMA İŞLEMİ ---
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('message').innerText = "Giriş başarılı! Token kaydedildi.";
                    localStorage.setItem('token', data.token); 
                    
                    document.getElementById('profileBtn').classList.remove('hidden');
                    document.getElementById('logoutBtn').classList.remove('hidden');
                } else {
                    document.getElementById('message').innerText = "Hata: " + data.message;
                }
            } catch (error) {
                console.error("Hata:", error);
            }
        }

        // --- KORUMALI SAYFAYA ERİŞİM (TOKEN TESTİ) ---
        async function getProfile() {
            const token = localStorage.getItem('token'); 

            if (!token) {
                document.getElementById('message').innerText = "Önce giriş yapmalısınız!";
                return;
            }

            try {
                const response = await fetch(`${API_URL}/profile`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('message').innerText = `Hoşgeldin ${data.user.username}! ${data.message}`;
                } else {
                    document.getElementById('message').innerText = "Yetkiniz yok: " + data.message;
                }
            } catch (error) {
                console.error("Hata:", error);
            }
        }

        // --- ÇIKIŞ YAPMA ---
        function logout() {
            localStorage.removeItem('token');
            document.getElementById('message').innerText = "Çıkış yapıldı.";
            document.getElementById('profileBtn').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
        }
    </script>
</body>
</html>
